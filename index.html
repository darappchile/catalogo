<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARAPP CHILE | Hub de Soluciones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffb703;
            --bg: #0f172a;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .hub-container {
            width: 90%; max-width: 450px;
            text-align: center;
            padding: 20px;
        }

        .logo-area { margin-bottom: 40px; }
        
        .logo-area h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem; margin: 0;
            background: linear-gradient(to bottom, #fff, #ffb703);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .tagline {
            font-size: 0.7rem; letter-spacing: 4px;
            color: #ffb703; text-transform: uppercase;
            margin-top: -5px; font-weight: 600;
        }

        /* GRID DE BOTONES */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px 15px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .hub-card i { font-size: 2rem; margin-bottom: 12px; transition: 0.3s; }
        .hub-card span { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* COLORES POR CATEGORÍA */
        .card-carne:hover { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .card-carne:hover i { color: #ef4444; transform: scale(1.2); }

        .card-almacen:hover { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .card-almacen:hover i { color: #22c55e; transform: scale(1.2); }

        .card-music:hover { border-color: #bc13fe; background: rgba(188, 19, 254, 0.1); }
        .card-music:hover i { color: #bc13fe; transform: scale(1.2); }

        .card-food:hover { border-color: #f97316; background: rgba(249, 115, 22, 0.1); }
        .card-food:hover i { color: #f97316; transform: scale(1.2); }

        .card-night:hover { border-color: #00f3ff; background: rgba(0, 243, 255, 0.1); }
        .card-night:hover i { color: #00f3ff; transform: scale(1.2); }

        .card-resto:hover { border-color: #d4af37; background: rgba(212, 175, 55, 0.1); }
        .card-resto:hover i { color: #d4af37; transform: scale(1.2); }

        .footer {
            margin-top: 50px;
            font-size: 0.6rem;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <div class="logo-area">
            <h1>DARAPP</h1>
            <div class="tagline">Sistemas e Innovación</div>
        </div>

        <div class="grid-menu">
            <a href="carniceria.html" class="hub-card card-carne">
                <i class="fas fa-drumstick-bite"></i>
                <span>Carnicería</span>
            </a>

            <a href="almacen.html" class="hub-card card-almacen">
                <i class="fas fa-store"></i>
                <span>Almacén</span>
            </a>

            <a href="banda.html" class="hub-card card-music">
                <i class="fas fa-guitar"></i>
                <span>Música</span>
            </a>

            <a href="food.html" class="hub-card card-food">
                <i class="fas fa-hamburger"></i>
                <span>Delivery</span>
            </a>

            <a href="night.html" class="hub-card card-night">
                <i class="fas fa-glass-cheers"></i>
                <span>Night Club</span>
            </a>

            <a href="restaurantes.html" class="hub-card card-resto">
                <i class="fas fa-utensils"></i>
                <span>Gourmet</span>
            </a>
        </div>

        <div class="footer">
            TECNOLOGÍA DESARROLLADA EN OVALLE<br>
            CHILE | 2026
        </div>
    </div>

</body>
</html>
